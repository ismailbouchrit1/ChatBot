{% extends "base.html" %}
{% block title %}Reinitialiser le mot de passe - Chatbot Socio-Emotionnel{% endblock %}
{% block body_class %}public-page{% endblock %}

{% block body %}
<div class="public-container">
    <div class="public-card">
        <h1>Reinitialiser le mot de passe</h1>
        <p>Choisissez un nouveau mot de passe (8 caracteres minimum).</p>
        <form id="resetForm">
            <input type="hidden" id="resetToken" value="{{ token }}">
            <div class="form-group">
                <label for="newPassword">Nouveau mot de passe</label>
                <input type="password" id="newPassword" class="form-input" required minlength="8">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Mettre a jour</button>
                <a href="/" class="btn btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('resetForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = document.getElementById('resetToken').value;
        const password = document.getElementById('newPassword').value;
        try {
            const res = await fetch('/api/auth/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erreur');
            alert('Mot de passe mis a jour. Vous pouvez vous connecter.');
            window.location.href = '/';
        } catch (err) {
            alert('Erreur lors de la reinitialisation.');
        }
    });
});
</script>
{% endblock %}
